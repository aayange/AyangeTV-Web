<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AyangeTV</title>
    <meta name="description" content="AyangeTV - Stream Movies, Shows & Live TV">
    <meta name="theme-color" content="#0f0a1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="styles.css?v=8">
</head>
<body>
    <!-- Top Header -->
    <header id="topbar">
        <div class="topbar-left">
            <div class="brand">
                <div class="brand-icon">A</div>
                <div class="brand-text">
                    <span class="greeting" id="greeting">Good evening,</span>
                    <span class="brand-name">AyangeTV</span>
                </div>
            </div>
        </div>
        <div class="topbar-center">
            <button class="icon-btn search-toggle" onclick="switchTab('search')" aria-label="Search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <div class="tab-pills">
                <button class="tab-pill active" data-tab="movies" onclick="switchTab('movies')">Movies</button>
                <button class="tab-pill" data-tab="series" onclick="switchTab('series')">Shows</button>
                <button class="tab-pill" data-tab="live" onclick="switchTab('live')">Live</button>
            </div>
        </div>
        <div class="topbar-right">
            <span id="date-display"></span>
            <button class="icon-btn" id="refresh-btn" onclick="refreshAll()" aria-label="Refresh" title="Refresh catalog">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            </button>
            <button class="icon-btn" onclick="switchTab('favorites')" aria-label="Favorites">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </button>
        </div>
    </header>

    <!-- Category Pills -->
    <div id="category-bar" class="hidden">
        <div id="category-pills"></div>
    </div>

    <!-- Back bar -->
    <div id="breadcrumb" class="hidden">
        <button onclick="goBack()" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><path d="M15 18l-6-6 6-6"/></svg>
            Back
        </button>
        <span id="breadcrumb-text"></span>
    </div>

    <!-- Main Content -->
    <main id="main">
        <div id="content"></div>
    </main>

    <!-- Mobile bottom nav -->
    <nav id="mobile-nav">
        <button class="mob-tab active" data-tab="movies" onclick="switchTab('movies')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/></svg>
            <span>Movies</span>
        </button>
        <button class="mob-tab" data-tab="series" onclick="switchTab('series')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3l-4 4-4-4"/></svg>
            <span>Shows</span>
        </button>
        <button class="mob-tab" data-tab="live" onclick="switchTab('live')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><path d="M8.5 16.5a5 5 0 010-9"/><path d="M15.5 16.5a5 5 0 000-9"/></svg>
            <span>Live</span>
        </button>
        <button class="mob-tab" data-tab="search" onclick="switchTab('search')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span>Search</span>
        </button>
        <button class="mob-tab" data-tab="favorites" onclick="switchTab('favorites')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span>Favs</span>
        </button>
    </nav>

    <!-- Fullscreen Player -->
    <div id="player-overlay" class="hidden">
        <div id="player-topbar">
            <button onclick="closePlayer()" class="player-close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="24" height="24"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <span id="player-title"></span>
            <div class="player-topbar-right">
                <div id="channel-nav" class="hidden">
                    <button onclick="prevChannel()" id="prev-ch-btn" class="ch-nav-btn">&laquo;</button>
                    <span id="channel-counter"></span>
                    <button onclick="nextChannel()" id="next-ch-btn" class="ch-nav-btn">&raquo;</button>
                </div>
                <button id="cc-btn" class="cc-btn" onclick="toggleSubMenu(event)" aria-label="Subtitles" title="Subtitles">CC</button>
            </div>
            <div id="cc-menu" class="cc-menu hidden">
                <div class="cc-menu-title">Subtitles</div>
                <div id="cc-tracks"></div>
                <div class="cc-menu-divider"></div>
                <button class="cc-menu-item" onclick="pickSubFile()">
                    <span>Upload .srt / .vtt</span>
                </button>
                <button class="cc-menu-item" onclick="searchOpenSubs()">
                    <span>Search OpenSubtitles</span>
                </button>
                <button class="cc-menu-item" onclick="changeOSKey()">
                    <span>Change API key</span>
                </button>
                <div id="cc-status" class="cc-status hidden"></div>
                <div id="cc-results" class="cc-results hidden"></div>
            </div>
        </div>
        <video id="video-player" controls autoplay playsinline crossorigin="anonymous"></video>
        <input type="file" id="sub-file-input" accept=".srt,.vtt" style="display:none" onchange="onSubFile(event)">
        <div id="player-error" class="hidden">
            <div class="error-icon">&#9888;</div>
            <p id="player-error-msg">Playback failed</p>
            <button onclick="tryNextLink()" id="try-next-btn" class="btn btn-primary">Try Next Format</button>
            <button onclick="closePlayer()" class="btn btn-glass">Close</button>
        </div>
    </div>

    <script src="app.js?v=11"></script>
</body>
</html>
